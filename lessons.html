<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ref</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;
  --sidebar-bg:#0c0e12;
  --surface:#181b22;
  --border:#232731;
  --text:#c4c9d4;
  --text2:#8b909e;
  --text3:#5a5f6c;
  --accent:#8aadf4;
  --accent-dim:#546a9e;
  --en:#dfe2ea;
  --zh:#959caa;
  --ex-bg:#14171e;
  --sidebar-w:180px;
}
body{
  font-family: "Charter", "Georgia", "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.65;
  font-size:14px;
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:10;
  overflow:hidden;
}
.sidebar-header{
  padding:16px 14px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  font-size:11px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;
}
.sidebar-nav{
  flex:1;overflow-y:auto;padding:6px 0;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.sidebar-nav .lesson-link{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  font:inherit;font-size:13px;color:var(--text2);
  transition:background .12s,color .12s;
  border-left:2px solid transparent;
}
.sidebar-nav .lesson-link:hover{background:var(--surface);color:var(--text)}
.sidebar-nav .lesson-link.active{
  background:var(--surface);color:var(--accent);
  border-left-color:var(--accent);
}
.lesson-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:3px;
  background:var(--surface);font-size:11px;font-weight:700;
  flex-shrink:0;font-family:system-ui,sans-serif;
}
.lesson-link.active .lesson-num{background:var(--accent);color:var(--sidebar-bg)}
.lesson-tag{
  font-size:10px;color:var(--text3);margin-left:auto;flex-shrink:0;
  font-family:system-ui,sans-serif;
}

/* Main */
.main{
  margin-left:var(--sidebar-w);
  flex:1;
  max-width:820px;
  padding:20px 36px 80px;
  width:calc(100% - var(--sidebar-w));
}

/* Search */
.search-bar{
  position:sticky;top:0;z-index:5;
  padding:8px 0 12px;
  background:var(--bg);
}
.search-bar input{
  width:100%;
  padding:8px 14px;
  border:1px solid var(--border);
  border-radius:4px;
  font-size:13px;
  background:var(--surface);
  color:var(--text);
  outline:none;
  font-family:inherit;
  transition:border-color .15s;
}
.search-bar input:focus{border-color:var(--accent-dim)}
.search-bar input::placeholder{color:var(--text3)}
.search-info{
  font-size:11px;color:var(--text3);margin-top:6px;
}

/* Book content */
.book-section{margin-bottom:28px}
.book-section-title{
  font-size:11px;font-weight:700;color:var(--accent-dim);
  text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border);
  padding-bottom:6px;margin-bottom:18px;
  font-family:system-ui,sans-serif;
}
.phrase-entry{
  margin-bottom:22px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.phrase-entry:last-child{border-bottom:none}
.phrase-head{
  margin-bottom:8px;
}
.phrase-term{
  font-size:16px;font-weight:700;color:var(--accent);
  letter-spacing:.3px;
}
.phrase-def{
  font-size:13px;color:var(--zh);
  margin-left:10px;
}
.phrase-def::before{content:'— ';color:var(--text3)}
.example-group{
  padding-left:18px;
  border-left:3px solid var(--border);
  margin-top:10px;
}
.example-item{
  margin-bottom:10px;
}
.example-item:last-child{margin-bottom:0}
.example-sentence{
  font-size:13.5px;color:var(--en);line-height:1.6;
}
.example-translation{
  font-size:12.5px;color:var(--zh);line-height:1.5;margin-top:1px;
}

/* Scenario */
.scenario-block{
  margin-bottom:6px;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--surface);
  overflow:hidden;
}
.scenario-block-title{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  cursor:pointer;user-select:none;
  font-size:13px;font-weight:600;color:var(--en);
}
.scenario-block-title:hover{background:var(--ex-bg)}
.scenario-block-title .arr{
  font-size:10px;color:var(--text3);transition:transform .15s;flex-shrink:0;
}
.scenario-block.open .scenario-block-title .arr{transform:rotate(90deg)}
.scenario-block-title .n{font-size:11px;color:var(--text3);font-weight:400}
.scenario-block-body{display:none;padding:0 16px 12px}
.scenario-block.open .scenario-block-body{display:block}
.scenario-row{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  padding:5px 0;border-bottom:1px dashed var(--border);
  font-size:13px;line-height:1.55;
}
.scenario-row:last-child{border-bottom:none}
.scenario-row .s-en{color:var(--en)}
.scenario-row .s-zh{color:var(--zh)}

/* Loading */
.loading{
  display:flex;align-items:center;justify-content:center;
  min-height:300px;color:var(--text3);font-size:13px;
}
.spinner{
  width:24px;height:24px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .6s linear infinite;margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:#e0556a;font-size:13px}

/* Mobile */
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;width:100%;padding:16px 12px 60px}
  .phrase-entry{margin-bottom:16px;padding-bottom:14px}
  .scenario-row{grid-template-columns:1fr;gap:2px}
  .example-group{padding-left:12px}
  .menu-btn{
    display:flex;position:fixed;top:8px;left:8px;z-index:20;
    width:34px;height:34px;border-radius:4px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text2);font-size:16px;cursor:pointer;
    align-items:center;justify-content:center;
  }
}
@media(min-width:701px){.menu-btn{display:none}}
</style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">Contents</div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<main class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>loading...</div>
</main>

<script>
(async function(){
  const sidebarNav=document.getElementById('sidebarNav');
  const mainContent=document.getElementById('mainContent');
  const sidebar=document.getElementById('sidebar');
  const menuBtn=document.getElementById('menuBtn');

  let lessons=[],currentIdx=0;

  try{
    const resp=await fetch('data/lessons.json');
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    lessons=await resp.json();
  }catch(err){
    mainContent.innerHTML=`<div class="error"><p>Failed to load: ${err.message}</p></div>`;
    return;
  }

  lessons.forEach((l,i)=>{
    const link=document.createElement('button');
    link.className='lesson-link';
    link.innerHTML=`<span class="lesson-num">${l.lesson}</span><span>第${l.lesson}课</span><span class="lesson-tag">${l.type==='scenario'?'场景':'词汇'}</span>`;
    link.addEventListener('click',()=>selectLesson(i));
    sidebarNav.appendChild(link);
  });

  selectLesson(0);

  function selectLesson(idx){
    currentIdx=idx;
    const lesson=lessons[idx];
    document.querySelectorAll('.lesson-link').forEach((el,i)=>el.classList.toggle('active',i===idx));
    if(lesson.type==='scenario')renderScenario(lesson);
    else renderVocabulary(lesson);
    mainContent.scrollTop=0;
    window.scrollTo({top:0,behavior:'instant'});
    if(window.innerWidth<=700)sidebar.classList.remove('open');
  }

  function renderVocabulary(lesson){
    let html='<div class="search-bar"><input type="text" id="searchInput" placeholder="Search..."><div class="search-info" id="searchInfo"></div></div>';
    html+='<div class="book-section">';
    html+='<div class="book-section-title">'+esc(lesson.title)+' &nbsp;·&nbsp; '+lesson.phrases.length+' entries</div>';
    html+='<div id="entryList"></div></div>';
    html+='<div id="noResult" class="error" style="display:none">No matching entries</div>';
    mainContent.innerHTML=html;

    const entryList=document.getElementById('entryList');
    const searchInput=document.getElementById('searchInput');
    const searchInfo=document.getElementById('searchInfo');
    const noResult=document.getElementById('noResult');

    function render(phrases){
      if(!phrases.length){
        entryList.innerHTML='';noResult.style.display='block';return;
      }
      noResult.style.display='none';
      entryList.innerHTML=phrases.map(p=>`
        <div class="phrase-entry">
          <div class="phrase-head">
            <span class="phrase-term">${esc(p.phrase)}</span>
            <span class="phrase-def">${esc(p.definition_zh)}</span>
          </div>
          <div class="example-group">
            ${(p.examples||[]).map(ex=>`
              <div class="example-item">
                <div class="example-sentence">${esc(ex.en)}</div>
                <div class="example-translation">${esc(ex.zh)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    render(lesson.phrases);

    searchInput.addEventListener('input',()=>{
      const q=searchInput.value.toLowerCase().trim();
      if(!q){searchInfo.textContent='';render(lesson.phrases);return;}
      const filtered=lesson.phrases.filter(p=>{
        const hay=[p.phrase,p.definition_zh,...(p.examples||[]).flatMap(e=>[e.en,e.zh])].join(' ').toLowerCase();
        return hay.includes(q);
      });
      searchInfo.textContent=filtered.length+' / '+lesson.phrases.length;
      render(filtered);
    });
  }

  function renderScenario(lesson){
    let html='<div class="book-section">';
    html+='<div class="book-section-title">'+esc(lesson.title)+' &nbsp;·&nbsp; '+lesson.sections.length+' sections</div>';
    html+=lesson.sections.map((sec,i)=>`
      <div class="scenario-block ${i===0?'open':''}">
        <div class="scenario-block-title">
          <span class="arr">▶</span><span>${esc(sec.title)}</span><span class="n">${sec.items.length}</span>
        </div>
        <div class="scenario-block-body">
          ${sec.items.map(item=>`
            <div class="scenario-row">
              <div class="s-en">${esc(item.en)}</div>
              <div class="s-zh">${esc(item.zh)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
    html+='</div>';
    mainContent.innerHTML=html;

    mainContent.querySelectorAll('.scenario-block-title').forEach(h=>{
      h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));
    });
  }

  function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

  // Mobile menu
  menuBtn.addEventListener('click',()=>sidebar.classList.toggle('open'));
  document.addEventListener('click',e=>{
    if(window.innerWidth<=700 && !sidebar.contains(e.target) && e.target!==menuBtn)sidebar.classList.remove('open');
  });
})();
</script>
</body>
</html>
