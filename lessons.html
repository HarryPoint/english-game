<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ref</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;
  --sidebar-bg:#0c0e12;
  --surface:#181b22;
  --border:#232731;
  --text:#c4c9d4;
  --text2:#8b909e;
  --text3:#5a5f6c;
  --accent:#8aadf4;
  --accent-dim:#546a9e;
  --en:#dfe2ea;
  --zh:#959caa;
  --ex-bg:#14171e;
  --sidebar-w:130px;
}
body{
  font-family: "Charter", "Georgia", "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
  font-size:14px;
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:10;
  overflow:hidden;
}
.sidebar-header{
  padding:10px 10px 6px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;
}
.sidebar-nav{
  flex:1;overflow-y:auto;padding:2px 0;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.sidebar-nav .lesson-link{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;
  cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  font:inherit;font-size:10px;color:var(--text2);
  transition:background .12s,color .12s;
  border-left:2px solid transparent;
}
.sidebar-nav .lesson-link:hover{background:var(--surface);color:var(--text)}
.sidebar-nav .lesson-link.active{
  background:var(--surface);color:var(--accent);
  border-left-color:var(--accent);
}
.lesson-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:2px;
  background:var(--surface);font-size:9px;font-weight:700;
  flex-shrink:0;font-family:system-ui,sans-serif;
}
.lesson-link.active .lesson-num{background:var(--accent);color:var(--sidebar-bg)}
.lesson-tag{
  font-size:8px;color:var(--text3);margin-left:auto;flex-shrink:0;
  font-family:system-ui,sans-serif;
}

/* Main */
.main{
  margin-left:var(--sidebar-w);
  flex:1;
  padding:14px 28px 48px;
  width:calc(100% - var(--sidebar-w));
}

/* Search */
.sticky-bar{
  position:sticky;top:0;z-index:5;
  background:var(--bg);
  padding-bottom:4px;
}
.search-bar{
  padding:4px 0 8px;
  background:var(--bg);
}
.search-bar input{
  width:100%;
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:3px;
  font-size:10px;
  background:var(--surface);
  color:var(--text);
  outline:none;
  font-family:inherit;
  transition:border-color .15s;
}
.search-bar input:focus{border-color:var(--accent-dim)}
.search-bar input::placeholder{color:var(--text3)}
.search-info{
  font-size:9px;color:var(--text3);margin-top:3px;
}

/* Book content */
.book-section{margin-bottom:16px}
.book-section-title{
  font-size:9px;font-weight:700;color:var(--accent-dim);
  text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border);
  padding-bottom:3px;margin-bottom:10px;
  font-family:system-ui,sans-serif;
}
.phrase-entry{
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.phrase-entry:last-child{border-bottom:none}
.phrase-head{
  margin-bottom:4px;
}
.phrase-term{
  font-size:16px;font-weight:700;color:var(--accent);
  letter-spacing:.3px;
}
.phrase-def{
  font-size:12px;color:var(--zh);
  margin-left:6px;
}
.phrase-def::before{content:'— ';color:var(--text3)}
.example-group{
  padding-left:12px;
  border-left:2px solid var(--border);
  margin-top:6px;
}
.example-item{
  margin-bottom:6px;
}
.example-item:last-child{margin-bottom:0}
.example-sentence{
  font-size:14px;color:var(--en);line-height:1.45;
}
.example-translation{
  font-size:13px;color:var(--zh);line-height:1.4;margin-top:0;
}

/* Audio play button */
.audio-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:17px;
  margin-right:3px;
  border:1px solid var(--border);
  border-radius:2px;
  background:var(--surface);
  color:var(--text3);
  cursor:pointer;
  font-size:7px;
  flex-shrink:0;
  vertical-align:middle;
  transition:all .15s;
  padding:0;
  line-height:1;
}
.audio-btn:hover{background:var(--accent-dim);color:var(--en);border-color:var(--accent-dim)}
.audio-btn.playing{background:var(--accent);color:var(--sidebar-bg);border-color:var(--accent)}
.audio-btn[data-audio=""]{display:none}
.example-sentence,.reading-en{display:flex;align-items:baseline}
.example-sentence .text,.reading-en .text{flex:1}

/* Play-all button */
.play-all-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;
  border:1px solid var(--border);
  border-radius:3px;
  background:var(--surface);
  color:var(--text2);
  cursor:pointer;
  font-size:10px;
  font-family:system-ui,sans-serif;
  transition:all .15s;
}
.play-all-btn:hover{background:var(--accent-dim);color:var(--en);border-color:var(--accent-dim)}
.play-all-btn.playing{background:var(--accent);color:var(--sidebar-bg);border-color:var(--accent)}
.play-all-header{display:flex;align-items:center;justify-content:space-between}
.play-all-header.sticky{
  position:sticky;z-index:4;
  padding:4px 0;
  background:var(--bg);
}

/* Reading / Book mode */
.reading-chapter{margin-bottom:20px}
.reading-chapter-title{
  font-size:16px;font-weight:700;color:var(--en);
  margin-bottom:14px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
  letter-spacing:.5px;
  font-family:system-ui,sans-serif;
}
.reading-section{margin-bottom:18px}
.reading-section-title{
  font-size:15px;font-weight:700;color:var(--accent);
  margin-bottom:10px;
}
.reading-group{margin-bottom:12px}
.reading-group-title{
  font-size:12px;font-weight:600;color:var(--accent-dim);
  margin-bottom:6px;letter-spacing:.4px;
  text-transform:uppercase;
  font-family:system-ui,sans-serif;
}
.reading-item{
  padding:2px 0;border-bottom:1px dotted var(--border);
  font-size:14px;line-height:1.45;
}
.reading-item:last-child{border-bottom:none}
.reading-en{color:var(--en);margin-bottom:1px}
.reading-zh{color:var(--zh)}

/* Loading */
.loading{
  display:flex;align-items:center;justify-content:center;
  min-height:200px;color:var(--text3);font-size:14px;
}
.spinner{
  width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .6s linear infinite;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:24px;color:#e0556a;font-size:14px}

/* Mobile */
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;width:100%;padding:10px 8px 40px}
  .phrase-entry{margin-bottom:10px;padding-bottom:8px}
  .reading-item{padding:2px 0}
  .example-group{padding-left:8px}
  .menu-btn{
    display:flex;position:fixed;top:6px;left:6px;z-index:20;
    width:28px;height:28px;border-radius:3px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text2);font-size:13px;cursor:pointer;
    align-items:center;justify-content:center;
  }
}
@media(min-width:701px){.menu-btn{display:none}}
</style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">Contents</div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<main class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>loading...</div>
</main>

<script>
(async function(){
  const sidebarNav=document.getElementById('sidebarNav');
  const mainContent=document.getElementById('mainContent');
  const sidebar=document.getElementById('sidebar');
  const menuBtn=document.getElementById('menuBtn');

  let lessons=[],currentIdx=0;
  let currentAudio=null,currentBtn=null;
  let seqAudio=null,seqBtn=null,seqTimer=null,seqBtns=[],seqIdx=0;

  try{
    const resp=await fetch('data/lessons.json');
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    lessons=await resp.json();
  }catch(err){
    mainContent.innerHTML=`<div class="error"><p>Failed to load: ${err.message}</p></div>`;
    return;
  }

  lessons.forEach((l,i)=>{
    const link=document.createElement('button');
    link.className='lesson-link';
    link.innerHTML=`<span class="lesson-num">${l.lesson}</span><span>第${l.lesson}课</span><span class="lesson-tag">${l.type==='scenario'?'场景':'词汇'}</span>`;
    link.addEventListener('click',()=>selectLesson(i));
    sidebarNav.appendChild(link);
  });

  selectLesson(0);

  function selectLesson(idx){
    // Reset sequential playback state
    if(seqTimer){clearTimeout(seqTimer);seqTimer=null}
    if(seqAudio){seqAudio.pause();seqAudio=null}
    seqBtn=null;seqIdx=0;
    if(currentAudio){currentAudio.pause();currentAudio=null;currentBtn=null}

    currentIdx=idx;
    const lesson=lessons[idx];
    document.querySelectorAll('.lesson-link').forEach((el,i)=>el.classList.toggle('active',i===idx));
    if(lesson.type==='scenario')renderScenario(lesson);
    else renderVocabulary(lesson);
    mainContent.scrollTop=0;
    window.scrollTo({top:0,behavior:'instant'});
    if(window.innerWidth<=700)sidebar.classList.remove('open');
  }

  function renderVocabulary(lesson){
    let html='<div class="sticky-bar"><div class="search-bar"><input type="text" id="searchInput" placeholder="Search..."><div class="search-info" id="searchInfo"></div></div>';
    html+='<div class="play-all-header"><div class="book-section-title">'+esc(lesson.title)+' &nbsp;·&nbsp; '+lesson.phrases.length+' entries</div><button class="play-all-btn" id="playAllBtn">▶ Play All</button></div></div>';
    html+='<div class="book-section">';
    html+='<div id="entryList"></div></div>';
    html+='<div id="noResult" class="error" style="display:none">No matching entries</div>';
    mainContent.innerHTML=html;

    const entryList=document.getElementById('entryList');
    const searchInput=document.getElementById('searchInput');
    const searchInfo=document.getElementById('searchInfo');
    const noResult=document.getElementById('noResult');

    function render(phrases){
      if(!phrases.length){
        entryList.innerHTML='';noResult.style.display='block';return;
      }
      noResult.style.display='none';
      entryList.innerHTML=phrases.map(p=>`
        <div class="phrase-entry">
          <div class="phrase-head">
            <span class="phrase-term">${esc(p.phrase)}</span>
            <span class="phrase-def">${esc(p.definition_zh)}</span>
          </div>
          <div class="example-group">
            ${(p.examples||[]).map(ex=>`
              <div class="example-item">
                <div class="example-sentence"><button class="audio-btn" type="button" data-audio="data/${esc(ex.audio||'')}" title="Play">▶</button><span class="text">${esc(ex.en)}</span></div>
                <div class="example-translation">${esc(ex.zh)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    render(lesson.phrases);

    searchInput.addEventListener('input',()=>{
      const q=searchInput.value.toLowerCase().trim();
      if(!q){searchInfo.textContent='';render(lesson.phrases);return;}
      const filtered=lesson.phrases.filter(p=>{
        const hay=[p.phrase,p.definition_zh,...(p.examples||[]).flatMap(e=>[e.en,e.zh])].join(' ').toLowerCase();
        return hay.includes(q);
      });
      searchInfo.textContent=filtered.length+' / '+lesson.phrases.length;
      render(filtered);
    });
  }

  function renderScenario(lesson){
    let html='<div class="reading-chapter">';
    html+='<div class="play-all-header sticky" style="top:0"><h1 class="reading-chapter-title" style="border:none;margin-bottom:0;padding-bottom:0">'+esc(lesson.title)+'</h1><button class="play-all-btn" id="playAllBtn">▶ Play All</button></div>';
    html+=lesson.sections.map(sec=>`
      <div class="reading-section">
        <h2 class="reading-section-title">${esc(sec.title)}</h2>
        ${(sec.groups||[]).map(g=>`
          <div class="reading-group">
            <h3 class="reading-group-title">${esc(g.title)}</h3>
            ${g.items.map(item=>`
              <div class="reading-item">
                <p class="reading-en"><button class="audio-btn" type="button" data-audio="data/${esc(item.audio||'')}" title="Play">▶</button><span class="text">${esc(item.en)}</span></p>
                <p class="reading-zh">${esc(item.zh)}</p>
              </div>
            `).join('')}
          </div>
        `).join('')}
        ${(sec.items||[]).map(item=>`
          <div class="reading-item">
            <p class="reading-en"><button class="audio-btn" type="button" data-audio="data/${esc(item.audio||'')}" title="Play">▶</button><span class="text">${esc(item.en)}</span></p>
            <p class="reading-zh">${esc(item.zh)}</p>
          </div>
        `).join('')}
      </div>
    `).join('');
    html+='</div>';
    mainContent.innerHTML=html;
  }

  function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

  // ---- Audio playback ----
  // (currentAudio, currentBtn, seqAudio, seqBtn, etc. declared at top)

  mainContent.addEventListener('click',function(e){
    const btn=e.target.closest('.audio-btn');
    if(!btn)return;
    e.preventDefault();

    const audioPath=btn.dataset.audio;
    if(!audioPath){return;}

    // Clicking the same button: toggle play/pause
    if(btn===currentBtn && currentAudio){
      if(currentAudio.paused){currentAudio.play();btn.classList.add('playing');btn.textContent='⏸'}
      else{currentAudio.pause();btn.classList.remove('playing');btn.textContent='▶'}
      return;
    }

    // Stop previous
    if(currentAudio){currentAudio.pause();currentAudio=null}
    if(currentBtn){currentBtn.classList.remove('playing');currentBtn.textContent='▶'}

    // Start new
    btn.classList.add('playing');
    btn.textContent='⏸';
    const audio=new Audio(audioPath);
    audio.preload='auto';
    audio.oncanplaythrough=()=>{
      audio.play().catch(()=>{btn.classList.remove('playing');btn.textContent='▶'});
    };
    audio.onended=()=>{
      btn.classList.remove('playing');
      btn.textContent='▶';
      currentAudio=null;currentBtn=null;
    };
    audio.onerror=()=>{
      btn.classList.remove('playing');
      btn.textContent='▶';
      currentAudio=null;currentBtn=null;
    };
    currentAudio=audio;
    currentBtn=btn;

    // Stop sequential play if user clicks individual button
    if(seqTimer){clearTimeout(seqTimer);seqTimer=null}
    if(seqAudio){seqAudio.pause();seqAudio=null}
    if(seqBtn){seqBtn.classList.remove('playing');seqBtn.innerHTML=seqIdx>0?'▶ Resume':'▶ Play All';seqBtn=null}
  });

  // ---- Sequential play-all ----
  function stopSeq(){
    if(seqTimer){clearTimeout(seqTimer);seqTimer=null}
    if(seqAudio){seqAudio.pause();seqAudio=null}
    if(seqBtn){seqBtn.classList.remove('playing');seqBtn.innerHTML=seqIdx>0?'▶ Resume':'▶ Play All';seqBtn=null}
    if(currentBtn){currentBtn.classList.remove('playing');currentBtn.textContent='▶'}
    currentAudio=null;currentBtn=null;
  }

  function playSeq(idx){
    if(!seqBtn)return;
    if(idx>=seqBtns.length){seqIdx=0;stopSeq();return;}
    seqIdx=idx;
    const btn=seqBtns[idx];
    const audioPath=btn.dataset.audio;
    if(!audioPath){playSeq(idx+1);return;}

    // Highlight current item
    if(currentBtn){currentBtn.classList.remove('playing');currentBtn.textContent='▶'}
    btn.classList.add('playing');
    btn.textContent='⏸';
    currentBtn=btn;

    const audio=new Audio(audioPath);
    audio.preload='auto';
    currentAudio=audio;
    seqAudio=audio;
    audio.oncanplaythrough=()=>{audio.play().catch(()=>{})};
    audio.onended=()=>{
      btn.classList.remove('playing');
      btn.textContent='▶';
      seqAudio=null;currentAudio=null;currentBtn=null;
      seqTimer=setTimeout(()=>playSeq(idx+1), 500);
    };
    audio.onerror=()=>{
      btn.classList.remove('playing');
      btn.textContent='▶';
      seqAudio=null;currentAudio=null;currentBtn=null;
      seqTimer=setTimeout(()=>playSeq(idx+1), 500);
    };
  }

  mainContent.addEventListener('click',function(e){
    const btn=e.target.closest('#playAllBtn');
    if(!btn)return;

    if(seqBtn){
      // Stop
      stopSeq();
    }else{
      // Start or resume
      seqBtn=btn;
      seqBtns=[...mainContent.querySelectorAll('.audio-btn[data-audio]')].filter(b=>b.dataset.audio);
      if(!seqBtns.length){seqBtn=null;return;}
      seqBtn.classList.add('playing');
      seqBtn.innerHTML='⏸ Stop';
      playSeq(seqIdx);
    }
  });

  // Mobile menu
  menuBtn.addEventListener('click',()=>sidebar.classList.toggle('open'));
  document.addEventListener('click',e=>{
    if(window.innerWidth<=700 && !sidebar.contains(e.target) && e.target!==menuBtn)sidebar.classList.remove('open');
  });
})();
</script>
</body>
</html>
